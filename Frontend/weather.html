<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Weather Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--muted); margin-top: 0.5rem; }

        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }

        .weather-display {
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .temp { font-size: 4rem; font-weight: 600; margin: 1rem 0; }
        .location { font-size: 1.5rem; color: var(--muted); }
        .desc { font-size: 1.25rem; text-transform: capitalize; }

        .history {
            margin-top: 2rem;
            border-top: 1px solid #334155;
            padding-top: 1.5rem;
        }

        .history h3 { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.875rem;
            color: #cbd5e1;
            border-bottom: 1px solid #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SkyCast</h1>
            <p>Know your weather, track your world</p>
        </header>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button onclick="getWeather()">Check</button>
        </div>

        <div id="weatherResult" class="weather-display">
            <div class="location" id="resLocation">London, UK</div>
            <div class="temp" id="resTemp">22°C</div>
            <div class="desc" id="resDesc">Scattered Clouds</div>
        </div>

        <div class="history">
            <h3>Recent Searches</h3>
            <div id="historyList">
                <!-- History items here -->
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:3001';

        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            if (!city) return alert("Please enter a city!");

            try {
                // Call our own Backend (which handles Caching)
                const res = await fetch(`${BACKEND_URL}/weather/${city}`);
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                // Update UI
                document.getElementById('resLocation').innerText = data.place;
                document.getElementById('resTemp').innerText = data.temperature;
                document.getElementById('resDesc').innerText = `${data.description} (${data.source || 'cached'})`;
                document.getElementById('weatherResult').style.display = 'block';

                loadHistory();
            } catch (err) {
                console.error(err);
                alert("Failed to fetch weather. Check city name or server.");
            }
        }


        async function loadHistory() {
            try {
                const res = await fetch(`${BACKEND_URL}/weather-history`);
                const data = await res.json();
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<span>${item.place}</span> <span>${item.temperature}</span>`;
                    list.appendChild(div);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Initial load
        window.onload = loadHistory;
    </script>
</body>
</html>
